<style>
  :root{
    --ink: #232526;
    --ink-soft: #63666a;
    --paper: #F1F3EF;
    --card: #FFFFFF;
    --line: #DDE1D8;
    --jacaranda: #C6B8E8;
    --jacaranda-deep: #7A6BB0;
    --harbour: #1F5C6B;
    --sand: #C98A3E;
    --coral: #C3573F;
    --grey: #8B8F87;
    --radius: 16px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --ink: #EDEEE9;
      --ink-soft: #A8ACA3;
      --paper: #16181A;
      --card: #222528;
      --line: #33363A;
      --jacaranda: #B29FDD;
      --jacaranda-deep: #9683CC;
      --harbour: #2C7285;
      --sand: #D9A059;
      --coral: #D97260;
      --grey: #7C807A;
    }
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ margin:0; padding:0; }
  html{ scroll-behavior: smooth; }
  body{ overscroll-behavior-y: none; }
  a, button, .stop-card, .day-pill, .cat-chip, .share-btn{
    -webkit-touch-callout: none;
    transition: transform .12s ease, opacity .12s ease, background-color .15s ease, border-color .15s ease;
  }
  button:active, .stop-card:active, .day-pill:active, .cat-chip:active, .share-btn:active, .fab button:active{
    transform: scale(0.96);
    opacity: 0.85;
  }
  body{
    background: var(--paper);
    color: var(--ink);
    font-family: 'Pretendard', -apple-system, sans-serif;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }
  .app{
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    background: var(--paper);
    position: relative;
    padding-bottom: calc(100px + env(safe-area-inset-bottom));
  }

    background-size: cover;
    background-position: 60% 42%;
    background-repeat: no-repeat;
    color: #fff;
    padding: calc(100px + env(safe-area-inset-top)) 20px 20px;
    position: relative;
    overflow: hidden;
    /* iPhone 14 Pro(390pt 폭) 기준, 화면 위쪽을 사진으로 꽉 채우는 비율.
       vh 대신 vw를 쓰는 이유: iOS Safari 탭(주소창 있음)과 홈 화면 앱(주소창 없음)은
       실제 뷰포트 높이 계산이 서로 달라서, vh 기준으로 잡으면 두 모드에서
       사진이 잘리는 위치가 달라져 보입니다. vw는 화면 너비 기준이라 두 모드에서 항상 동일합니다. */
    height: clamp(230px, 72vw, 300px);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    box-sizing: border-box;
  }
  .hero-top{ display:flex; justify-content:space-between; align-items:flex-end; position:relative; z-index:1;}
  .eyebrow{
    font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color: rgba(255,255,255,0.75); font-weight:600; margin:0 0 4px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.35);
  }
  .title{
    font-family:'Pretendard', sans-serif; font-weight:800;
    font-size:36px; margin:0; line-height:1;
    letter-spacing:0.01em;
    text-shadow: 0 2px 10px rgba(0,0,0,0.35);
  }
  .subtitle{ font-size:13px; color: rgba(255,255,255,0.9); margin-top:7px; font-weight:500; text-shadow: 0 1px 6px rgba(0,0,0,0.35);}
  .petal{ width:34px; height:34px; opacity:0.95; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3)); }

  /* Day tabs */
  .day-tabs{
    display:flex; gap:8px; overflow-x:auto;
    padding: 14px 16px 12px;
    scrollbar-width:none;
  }
  .day-tabs::-webkit-scrollbar{ display:none; }
  .day-pill{
    flex:0 0 auto;
    padding:8px 14px;
    border-radius:999px;
    background: var(--card);
    border:1px solid var(--line);
    font-size:13px; font-weight:600; color: var(--ink-soft);
    cursor:pointer; white-space:nowrap;
    display:flex; flex-direction:column; align-items:center; line-height:1.2;
    transition: all .15s ease;
  }
  .day-pill .d-num{ font-family:'Pretendard', sans-serif; font-weight:700; font-size:15px; }
  .day-pill.active{
    background: var(--jacaranda-deep); border-color: var(--jacaranda-deep); color:#fff;
  }
  .day-pill.add{
    background:transparent; border:1px dashed var(--grey); color:var(--grey); font-size:18px; padding:8px 16px;
  }

  /* Day header */
  .day-head{
    padding: 4px 20px 8px; display:flex; justify-content:space-between; align-items:flex-end;

<script>
const CATS = {
  lodging: { label:'숙소', color:'#1F5C6B' },

  food:    { label:'음식', color:'#C98A3E' },
  transit: { label:'이동', color:'#8B8F87' },
  etc:     { label:'기타', color:'#C3573F' }
};
const STORAGE_KEY = 'sydney-trip-data';

/* ============================================================
   실시간 공동 편집 설정 (Firebase Realtime Database)
   ------------------------------------------------------------
   GitHub Pages는 정적 호스팅이라 그 자체로는 여러 사람의
   기기끼리 데이터를 동기화해줄 수 없습니다. 친구들과 실시간으로
   같은 일정을 보고 수정하려면, 무료 Firebase 프로젝트를 하나
   만들고 아래 firebaseConfig 값을 채워 넣어야 합니다.

   설정 방법 (5분):
   1) https://console.firebase.google.com 접속 → 새 프로젝트 생성
   2) 왼쪽 메뉴 "빌드 > Realtime Database" → 데이터베이스 만들기
      → 테스트 모드로 시작 (친구들끼리만 쓰는 링크라 우선 테스트 모드로 충분)
   3) 프로젝트 설정(톱니바퀴) > 일반 > "내 앱" > 웹 앱 추가(</>)
   4) 발급되는 firebaseConfig 객체를 그대로 아래에 붙여넣기
   5) GitHub에 커밋 & 푸시하면 끝. 이제 이 링크를 여는 모든 사람이
      같은 일정을 실시간으로 보고, 누가 수정하면 즉시 반영됩니다.

   firebaseConfig를 채우지 않으면 기존처럼 각자 기기에만
   저장되는 방식(localStorage)으로 자동 동작합니다.
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyALATqSoiM1hTBQZjS6eT5YwItdIrBi4tE",
  authDomain: "gsdg-syd.firebaseapp.com",
  databaseURL: "https://gsdg-syd-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "gsdg-syd",
  storageBucket: "gsdg-syd.firebasestorage.app",
  messagingSenderId: "970318800180",
  appId: "1:970318800180:web:7d933d2ba3cb8f850b7161",
  measurementId: "G-S7QSN9SG55"
};

const hasFirebaseConfig = firebaseConfig.apiKey && firebaseConfig.apiKey !== 'YOUR_API_KEY';
let fbRef = null;
let fbReady = false;

if(hasFirebaseConfig && typeof firebase !== 'undefined'){
  try{
    firebase.initializeApp(firebaseConfig);
    fbRef = firebase.database().ref(STORAGE_KEY);
  }catch(e){
    console.warn('Firebase 초기화 실패, 로컬 저장으로 전환합니다.', e);
    fbRef = null;
  }
}

const defaultData = {
  days: [
    { id:'d1', label:'1일차', date:'', items:[
      {id:'i1', time:'09:30', name:'자라타워 체크인', category:'lodging', note:'짐 맡기기'},
      {id:'i2', time:'11:00', name:'하이드파크', category:'sight', note:''},
      {id:'i3', time:'11:30', name:'세인트메리스 대성당', category:'sight', note:'외관'},
      {id:'i4', time:'14:00', name:'서큘러키', category:'sight', note:''},
      {id:'i5', time:'14:30', name:'오페라하우스', category:'sight', note:'외관 관람'},
      {id:'i6', time:'18:00', name:'더락스', category:'sight', note:'저녁 & 야경'}
    ]},
    { id:'d2', label:'2일차', date:'', items:[
      {id:'i7', time:'10:00', name:'시드니대 쿼드랭글', category:'sight', note:'자카란다'},
      {id:'i8', time:'13:00', name:'로열 보타닉 가든', category:'sight', note:''},

    ]},
    { id:'d3', label:'3일차', date:'', items:[
      {id:'i10', time:'09:30', name:'페더데일 야생동물원', category:'sight', note:'전철+택시'}
    ]},
    { id:'d4', label:'4일차', date:'', items:[
      {id:'i11', time:'09:00', name:'키리빌리 자카란다 워크', category:'sight', note:'맥두걸 스트리트, 아침 일찍'},
      {id:'i12', time:'11:00', name:'하버브릿지', category:'sight', note:'도보'}
    ]},
    { id:'d5', label:'5일차', date:'', items:[

    ]},
    { id:'d6', label:'6일차', date:'', items:[
      {id:'i15', time:'10:00', name:'본다이비치', category:'sight', note:'마지막날'}
    ]}
  ]
};

let data = null;
let activeDayId = null;
let editingItemId = null;

function uid(){ return 'x' + Math.random().toString(36).slice(2,9); }

/* Firebase Realtime Database는 빈 배열([])을 저장하면 해당 키 자체를 지워버립니다.
   그래서 한 날짜의 일정을 전부 지우면 서버에서 다시 받아올 때 day.items가
   undefined로 돌아와서 이후 렌더링이 전부 조용히 깨져버리는 문제가 있었습니다.
   받아온(또는 로컬에서 불러온) 데이터는 항상 이 함수를 거쳐서 items가
   확실히 배열이 되도록 보정합니다. */
function normalizeData(d){
  if(!d || !Array.isArray(d.days) || !d.days.length) return defaultData;
  d.days.forEach(day => {
    if(!Array.isArray(day.items)) day.items = [];
  });
  return d;
}

const hasClaudeStorage = typeof window.storage !== 'undefined';

function applyIncomingData(remoteData, isFirstLoad){
  data = normalizeData(remoteData);
  if(isFirstLoad){
    const lastDay = localStorage.getItem('sydney-last-day');
    activeDayId = (lastDay && data.days.find(d => d.id === lastDay)) ? lastDay : data.days[0].id;
  }else if(!data.days.find(d => d.id === activeDayId)){
    activeDayId = data.days[0].id;
  }
  render();
  updateSyncBadge();
}

function updateSyncBadge(){
  const el = document.getElementById('syncBadge');
  if(!el) return;
  el.textContent = fbRef ? '· 🟢 실시간 공유중' : '· 📱 이 기기에만 저장됨';
}

/* 수동 동기화: 리스너의 다음 업데이트를 기다리지 않고 지금 바로 서버에서 최신 데이터를 받아옵니다. */
async function forceSync(){
  if(!fbRef) return { ok:true, remote:false };
  try{
    const snap = await fbRef.once('value');
    applyIncomingData(snap.val(), false);
    return { ok:true, remote:true };
  }catch(e){
    console.warn('동기화 실패', e);
    return { ok:false, remote:true };
  }
}

let toastTimer = null;
function showToast(msg, duration){
  const el = document.getElementById('toast');
  if(!el) return;
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), duration || 1800);
}

async function loadData(){
  if(fbRef){
    // 실시간 모드: 누군가 데이터를 바꾸면 모든 사람 화면에 즉시 반영됩니다.
    let firstLoad = true;
    fbRef.on('value', (snapshot) => {
      const val = snapshot.val();
      if(!val && firstLoad){
        // DB가 비어있으면 기본 일정으로 초기값을 채워둡니다.
        fbRef.set(defaultData);
      }
      applyIncomingData(val, firstLoad);
      if(firstLoad){
        firstLoad = false;
        fbReady = true;
        requestAnimationFrame(() => {
          const lastScroll = parseInt(localStorage.getItem('sydney-last-scroll') || '0', 10);
          if(lastScroll) window.scrollTo(0, lastScroll);
        });
      }
    }, (err) => {
      console.warn('Firebase 실시간 연결 실패, 로컬 저장으로 전환합니다.', err);
      fbRef = null;
      loadDataLocal();
    });
    return;
  }
  await loadDataLocal();
}

async function loadDataLocal(){
  try{
    if(hasClaudeStorage){
      const res = await window.storage.get(STORAGE_KEY, false);
      data = res && res.value ? JSON.parse(res.value) : defaultData;
    }else{
      const raw = localStorage.getItem(STORAGE_KEY);
      data = raw ? JSON.parse(raw) : defaultData;
    }
  }catch(e){
    data = defaultData;
  }
  if(!data.days || !data.days.length){ data = defaultData; }
  data = normalizeData(data);
  const lastDay = localStorage.getItem('sydney-last-day');
  activeDayId = (lastDay && data.days.find(d => d.id === lastDay)) ? lastDay : data.days[0].id;
  render();
  updateSyncBadge();
  requestAnimationFrame(() => {
    const lastScroll = parseInt(localStorage.getItem('sydney-last-scroll') || '0', 10);
    if(lastScroll) window.scrollTo(0, lastScroll);
  });
}

async function saveData(){
  try{
    if(fbRef){
      // set()으로 저장하면 연결된 모든 친구 화면에 실시간으로 반영됩니다.
      await fbRef.set(data);
      return;
    }
    if(hasClaudeStorage){
      await window.storage.set(STORAGE_KEY, JSON.stringify(data), false);
    }else{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }
  }catch(e){ console.error('저장 실패', e); }
}

function getActiveDay(){
  return data.days.find(d => d.id === activeDayId);
}

function renderTabs(){
  const wrap = document.getElementById('dayTabs');
  wrap.innerHTML = '';
  data.days.forEach((d, idx) => {
    const el = document.createElement('div');
    el.className = 'day-pill' + (d.id === activeDayId ? ' active' : '');
    el.innerHTML = `<span class="d-num">${idx+1}</span><span>${d.date || ''}</span>`;
    el.onclick = () => { activeDayId = d.id; localStorage.setItem('sydney-last-day', d.id); render(); };
    wrap.appendChild(el);
  });
  const addEl = document.createElement('div');
  addEl.className = 'day-pill add';
  addEl.textContent = '+';
  addEl.onclick = addDay;
  wrap.appendChild(addEl);
}

function addDay(){
  const idx = data.days.length + 1;
  const nd = { id: uid(), label: idx + '일차', date:'', items:[] };
  data.days.push(nd);
  activeDayId = nd.id;
  saveData();
  render();
}

function deleteDay(){
  if(data.days.length <= 1) return;
  if(!confirm('이 날짜 전체를 삭제할까요?')) return;
  data.days = data.days.filter(d => d.id !== activeDayId);
  activeDayId = data.days[0].id;
  saveData();
  render();
}

function toggleCollapse(){
  const collapsed = getCollapsedMap();
  collapsed[activeDayId] = !collapsed[activeDayId];
  saveCollapsedMap(collapsed);
  render();
}

function getCollapsedMap(){
  try{ return JSON.parse(localStorage.getItem('sydney-collapsed-days') || '{}'); }
  catch(e){ return {}; }
}
function saveCollapsedMap(map){
  try{ localStorage.setItem('sydney-collapsed-days', JSON.stringify(map)); }catch(e){}
}

function dayCompletion(day){
  if(!day.items || !day.items.length) return null;
  const done = day.items.filter(i => i.done).length;
  return Math.round((done / day.items.length) * 100);
}

function renderDayHead(){
  const day = getActiveDay();
  const idx = data.days.findIndex(d => d.id === day.id) + 1;
  const head = document.getElementById('dayHead');
  const collapsed = !!getCollapsedMap()[day.id];
  const pct = dayCompletion(day);
  head.innerHTML = `
    <div class="day-head">
      <h2>
        <button class="collapse-btn" id="collapseBtn" aria-label="접기/펼치기">${collapsed ? '▸' : '▾'}</button>
        ${idx}일차
        ${pct !== null ? `<span class="pct-badge">${pct}%</span>` : ''}
      </h2>
      <input class="day-date-input" id="dateInput" placeholder="날짜 입력 예: 7/9 (목)" value="${day.date || ''}">
    </div>
    <div class="day-actions"><button class="day-del" id="delDayBtn">이 날짜 삭제</button></div>
  `;
  document.getElementById('collapseBtn').onclick = toggleCollapse;
  document.getElementById('dateInput').addEventListener('change', (e) => {
    day.date = e.target.value; saveData(); renderTabs();
  });
  document.getElementById('delDayBtn').onclick = deleteDay;
}

function renderLegend(){
  const el = document.getElementById('legend');
  el.innerHTML = Object.entries(CATS).map(([k,v]) =>
    `<span><i style="background:${v.color}"></i>${v.label}</span>`
  ).join('');
}

function mapUrls(name){
  const q = encodeURIComponent(name + ' Sydney');
  return {
    apple: `https://maps.apple.com/?q=${q}`,
    google: `https://www.google.com/maps/search/?api=1&query=${q}`
  };
}

function renderTimeline(){
  const day = getActiveDay();
  const tl = document.getElementById('timeline');
  const collapsed = !!getCollapsedMap()[day.id];
  if(collapsed){
    tl.innerHTML = `<div class="empty-state"><div class="big">▸</div><p>접힌 날짜예요. 위 화살표를 눌러 펼쳐보세요.</p></div>`;
    return;
  }
  const items = [...(day.items || [])].sort((a,b) => (a.time||'').localeCompare(b.time||''));
  if(!items.length){
    tl.innerHTML = `<div class="empty-state"><div class="big">🌸</div><p>아직 일정이 없어요.<br>오른쪽 아래 + 버튼으로 추가해보세요.</p></div>`;
    return;
  }
  tl.innerHTML = items.map(it => {
    const cat = CATS[it.category] || CATS.etc;
    const urls = mapUrls(it.name);
    return `
      <div class="stop">
        <div class="rail">
          <div class="dot" style="background:${cat.color}"></div>
          <div class="stem"></div>
        </div>
        <div class="stop-card ${it.done ? 'done' : ''}" data-id="${it.id}">
          <div class="stop-top">
            <label class="chk-wrap">
              <input type="checkbox" class="chk-box" data-id="${it.id}" ${it.done ? 'checked' : ''}>
            </label>
            <span class="stop-time">${it.time || '--:--'}</span>
            <span class="stop-cat" style="background:${cat.color}">${cat.label}</span>
          </div>
          <p class="stop-name">${escapeHtml(it.name)}</p>
          ${it.note ? `<p class="stop-note">${escapeHtml(it.note)}</p>` : ''}
          <div class="map-row">
            <a class="map-link" href="${urls.apple}" data-stop>🗺️ Apple 지도</a>
            <a class="map-link" href="${urls.google}" target="_blank" rel="noopener" data-stop>Google 지도</a>
          </div>
        </div>
      </div>
    `;
  }).join('');
  tl.querySelectorAll('.stop-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if(e.target.closest('[data-stop]') || e.target.classList.contains('chk-box')) return;
      openEdit(card.dataset.id);
    });
  });
  tl.querySelectorAll('.chk-box').forEach(box => {
    box.addEventListener('change', (e) => {
      e.stopPropagation();
      const item = day.items.find(i => i.id === box.dataset.id);
      if(item){ item.done = box.checked; saveData(); render(); }
    });
    box.addEventListener('click', (e) => e.stopPropagation());
  });
}

function escapeHtml(s){
  return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render(){
  renderTabs();
  renderDayHead();
  renderLegend();
  renderTimeline();
  if(typeof renderDday === 'function') renderDday();
}

/* Modal logic */
const overlay = document.getElementById('overlay');
let selectedCat = 'sight';

function buildCatRow(){
  const row = document.getElementById('catRow');
  row.innerHTML = Object.entries(CATS).map(([k,v]) =>
    `<div class="cat-chip ${k===selectedCat?'selected':''}" data-cat="${k}" style="${k===selectedCat?`background:${v.color};border-color:${v.color}`:''}">${v.label}</div>`
  ).join('');
  row.querySelectorAll('.cat-chip').forEach(chip => {
    chip.onclick = () => { selectedCat = chip.dataset.cat; buildCatRow(); };
  });
}

function openAdd(){
  editingItemId = null;
  document.getElementById('sheetTitle').textContent = '일정 추가';
  document.getElementById('fTime').value = '';
  document.getElementById('fName').value = '';
  document.getElementById('fNote').value = '';
  selectedCat = 'sight';
  buildCatRow();
  document.getElementById('deleteBtn').style.display = 'none';
  overlay.classList.add('open');
}

function openEdit(itemId){
  const day = getActiveDay();
  const item = day.items.find(i => i.id === itemId);
  if(!item) return;
  editingItemId = itemId;
  document.getElementById('sheetTitle').textContent = '일정 수정';
  document.getElementById('fTime').value = item.time || '';
  document.getElementById('fName').value = item.name || '';
  document.getElementById('fNote').value = item.note || '';
  selectedCat = item.category || 'sight';
  buildCatRow();
  document.getElementById('deleteBtn').style.display = 'block';
  overlay.classList.add('open');
}

function closeSheet(){ overlay.classList.remove('open'); }

document.getElementById('addBtn').onclick = openAdd;
document.getElementById('cancelBtn').onclick = closeSheet;
overlay.addEventListener('click', (e) => { if(e.target === overlay) closeSheet(); });

/* 설정 시트 (친구에게 공유 / 받은 일정 불러오기) */
const settingsOverlay = document.getElementById('settingsOverlay');
const settingsBtn = document.getElementById('settingsBtn');
const settingsCloseBtn = document.getElementById('settingsCloseBtn');
if(settingsBtn){
  settingsBtn.onclick = () => settingsOverlay.classList.add('open');
}
if(settingsCloseBtn){
  settingsCloseBtn.onclick = () => settingsOverlay.classList.remove('open');
}
if(settingsOverlay){
  settingsOverlay.addEventListener('click', (e) => {
    if(e.target === settingsOverlay) settingsOverlay.classList.remove('open');
  });
}

document.getElementById('saveBtn').onclick = () => {
  const time = document.getElementById('fTime').value;
  const name = document.getElementById('fName').value.trim();
  const note = document.getElementById('fNote').value.trim();
  if(!name){ alert('장소 / 할 일을 입력해주세요'); return; }
  const day = getActiveDay();
  if(!day.items) day.items = [];
  if(editingItemId){
    const item = day.items.find(i => i.id === editingItemId);
    item.time = time; item.name = name; item.note = note; item.category = selectedCat;
  }else{
    day.items.push({ id: uid(), time, name, note, category: selectedCat });
  }
  saveData();
  closeSheet();
  render();
};

document.getElementById('deleteBtn').onclick = () => {
  if(!editingItemId) return;
  const day = getActiveDay();
  day.items = (day.items || []).filter(i => i.id !== editingItemId);
  saveData();
  closeSheet();
  render();
};

/* Export / Import for sharing with friends */
document.getElementById('exportBtn').onclick = () => {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'sydney-trip.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
};

document.getElementById('importBtn').onclick = () => {
  document.getElementById('importFile').click();
};

document.getElementById('importFile').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (evt) => {
    try{
      const parsed = JSON.parse(evt.target.result);
      if(!parsed.days || !parsed.days.length) throw new Error('invalid');
      data = parsed;
      activeDayId = data.days[0].id;
      saveData();
      render();
      alert('일정을 불러왔어요! 🌸');
    }catch(err){
      alert('올바른 일정 파일이 아니에요.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

/* D-Day / 여행 카운트 */
function renderDday(){
  const badge = document.getElementById('ddayBadge');
  if(!badge) return;
  const startStr = localStorage.getItem('sydney-trip-start');
  if(!startStr){
    badge.textContent = '📅 여행 시작일 설정하기';
    badge.onclick = setTripStart;
    return;
  }
  const start = new Date(startStr + 'T00:00:00');
  const tripLength = data.days.length || 6;
  const end = new Date(start);
  end.setDate(end.getDate() + tripLength - 1);
  const today = new Date();
  today.setHours(0,0,0,0);
  const msPerDay = 24*60*60*1000;
  const diffToStart = Math.round((start - today) / msPerDay);
  let label;
  if(diffToStart > 0){
    label = `📅 D-${diffToStart}`;
  }else if(today > end){
    label = '✅ 여행 완료 (Completed)';
  }else{
    const dayNum = Math.round((today - start) / msPerDay) + 1;
    label = `✈️ Day ${dayNum}`;
  }
  badge.textContent = label + '  ·  변경';
  badge.onclick = setTripStart;
}

function setTripStart(){
  const current = localStorage.getItem('sydney-trip-start') || '';
  const input = prompt('여행 시작일을 입력해주세요 (예: 2026-10-24)', current);
  if(input === null) return;
  if(/^\d{4}-\d{2}-\d{2}$/.test(input.trim())){
    localStorage.setItem('sydney-trip-start', input.trim());
    renderDday();
  }else if(input.trim() === ''){
    localStorage.removeItem('sydney-trip-start');
    renderDday();
  }else{
    alert('YYYY-MM-DD 형식으로 입력해주세요.');
  }
}

/* 마지막 스크롤 위치 기억 */
let scrollSaveTimer = null;
window.addEventListener('scroll', () => {
  clearTimeout(scrollSaveTimer);
  scrollSaveTimer = setTimeout(() => {
    localStorage.setItem('sydney-last-scroll', String(window.scrollY));
  }, 200);
}, { passive: true });

/* 설치 안내 배너 (최초 1회) */
function initInstallBanner(){
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  const alreadyShown = localStorage.getItem('sydney-install-banner-shown');
  const banner = document.getElementById('installBanner');
  if(!banner) return;
  if(!isStandalone && !alreadyShown){
    banner.style.display = 'flex';
    localStorage.setItem('sydney-install-banner-shown', '1');
  }
  const closeBtn = document.getElementById('installBannerClose');
  if(closeBtn){
    closeBtn.onclick = () => { banner.style.display = 'none'; };
  }
}
initInstallBanner();

/* Service worker 등록 (오프라인 지원) + 업데이트 자동 반영 */
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').then((reg) => {
      // 등록 직후 새 버전이 있는지 바로 한번 확인
      reg.update();
      // 앱을 다시 열거나 백그라운드에서 돌아올 때마다 업데이트 확인
      document.addEventListener('visibilitychange', () => {
        if(document.visibilityState === 'visible') reg.update();
      });
    }).catch((err) => {
      console.warn('Service worker registration failed:', err);
    });

    // 새 서비스워커가 활성화되면(컨트롤러 교체) 화면을 한 번 새로고침해서
    // 예전 JS가 아니라 최신 버전이 바로 반영되도록 합니다.
    let swRefreshed = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if(swRefreshed) return;
      swRefreshed = true;
      window.location.reload();
    });
  });
}

/* 오프닝 화면: 친구들과 뉴런 공유 버튼 */
const splash = document.getElementById('splash');
const splashSyncBtn = document.getElementById('splashSyncBtn');
const splashStatus = document.getElementById('splashStatus');
const splashSkipBtn = document.getElementById('splashSkipBtn');

function hideSplash(){
  if(!splash) return;
  splash.classList.add('hide');
  setTimeout(() => { splash.style.display = 'none'; }, 480);
}

if(splashSyncBtn){
  splashSyncBtn.onclick = async () => {
    splashSyncBtn.classList.add('syncing');
    splashSyncBtn.innerHTML = '<span class="spin"></span> 뉴런 전송 중...';
    splashStatus.textContent = fbRef ? '친구들 기기와 연결하는 중…' : '';
    const result = await forceSync();
    splashSyncBtn.classList.remove('syncing');
    if(!fbRef){
      splashSyncBtn.innerHTML = '📱 이 기기 전용 모드';
      splashStatus.textContent = '실시간 공유가 아직 설정되어 있지 않아요';
    }else if(result.ok){
      splashSyncBtn.innerHTML = '✅ 뉴런 공유 완료!';
      splashStatus.textContent = '최신 일정을 받아왔어요';
    }else{
      splashSyncBtn.innerHTML = '⚠️ 연결 실패';
      splashStatus.textContent = '네트워크를 확인하고 다시 시도해주세요';
    }
    setTimeout(hideSplash, 650);
  };
}
if(splashSkipBtn){
  splashSkipBtn.onclick = hideSplash;
}

/* 일정 화면 안에서 바로 누르는 새로고침 버튼 */
const refreshBtn = document.getElementById('refreshBtn');
if(refreshBtn){
  refreshBtn.onclick = async () => {
    refreshBtn.classList.add('spinning');
    const result = await forceSync();
    refreshBtn.classList.remove('spinning');
    if(!fbRef) showToast('📱 이 기기에만 저장되는 모드예요');
    else if(result.ok) showToast('🌸 최신 일정으로 동기화했어요');
    else showToast('⚠️ 동기화 실패, 다시 시도해주세요');
  };
}

loadData();
</script>
